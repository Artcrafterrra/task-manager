<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}IT Tasks{% endblock %}</title>
  </head>
  <body>
    <header>
      <a href="{% url 'tracker:task-list' %}">Tasks</a> |
      {% if request.user.is_authenticated %}
        Hello, {{ request.user }}!
      <form method="post" action="{% url 'logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit" style="background:none;border:none;color:#06c;cursor:pointer;">
          Logout
        </button>
  </form>
      {% else %}
        <a href="{% url 'login' %}">Login</a> |
        <a href="{% url 'signup' %}">Sign up</a>
      {% endif %}
    </header>
    <hr>
    {% block content %}{% endblock %}
  </body>
</html>
