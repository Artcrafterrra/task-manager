{% extends "base.html" %}
{% block title %}Task Types{% endblock %}
{% block content %}
  <h1>Task Types</h1>
  <p><a href="{% url 'tracker:tasktype-create' %}">+ Add Type</a></p>
  <ul>
    {% for t in types %}
      <li>{{ t.name }}</li>
    {% empty %}
      <li>No types yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
